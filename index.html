<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicDB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div class="hero-copy">
                <h1 id="title">MusicDB</h1>
                <p class="hero-tagline">Search artists, explore albums, and open full discography details instantly.</p>
            </div>
            <form id="search-form" class="search-container" novalidate>
                <div class="search-input-wrap">
                    <span class="search-icon">🔎</span>
                    <input type="text" id="search-input" placeholder="Search artist name" autocomplete="off">
                </div>
                <button class="search-button" type="submit">Search</button>
                <div id="search-results" class="search-results"></div>
            </form>
        </header>
    </div>
    <script src="app.js"></script>
</body>
</html>
