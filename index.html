<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicDB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="home-page">
  <div class="home-container">
    <div class="home-hero">
      <h1 class="home-logo">MusicDB</h1>
      <p class="home-tagline">Explore artists, albums & tracks</p>
      <div class="search-wrapper">
        <div class="search-field">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search for an artist…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="search-clear" id="searchClear" aria-label="Clear search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </div>

  <script>
    let db = [];

    fetch('./final_database.json')
      .then(r => r.json())
      .then(data => { db = data; })
      .catch(() => {
        document.getElementById('searchResults').innerHTML =
          '<div class="search-empty">Failed to load database.</div>';
      });

    const input = document.getElementById('searchInput');
    const results = document.getElementById('searchResults');
    const clearBtn = document.getElementById('searchClear');

    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      clearBtn.classList.toggle('visible', q.length > 0);
      if (!q) { results.innerHTML = ''; results.classList.remove('open'); return; }

      const matches = db
        .filter(a => a.name.toLowerCase().includes(q))
        .slice(0, 12);

      if (!matches.length) {
        results.innerHTML = '<div class="search-empty">No artists found.</div>';
        results.classList.add('open');
        return;
      }

      results.innerHTML = matches.map(a => `
        <a class="result-item" href="artist.html?id=${a.id}">
          <div class="result-avatar">${a.name.charAt(0).toUpperCase()}</div>
          <div class="result-info">
            <span class="result-name">${highlight(a.name, q)}</span>
            <span class="result-meta">${fmt(a.listeners)} listeners &middot; ${a.album_count} releases</span>
          </div>
          <svg class="result-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      `).join('');
      results.classList.add('open');
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.classList.remove('visible');
      results.innerHTML = '';
      results.classList.remove('open');
      input.focus();
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrapper')) {
        results.classList.remove('open');
      }
    });

    input.addEventListener('focus', () => {
      if (input.value.trim()) results.classList.add('open');
    });

    function fmt(n) {
      if (!n && n !== 0) return '—';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
      return n.toLocaleString();
    }

    function highlight(text, q) {
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(re, '<mark>$1</mark>');
    }
  </script>
</body>
</html>
